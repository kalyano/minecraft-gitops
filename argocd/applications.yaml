# One Argo CD Application per environment, each pointed at its Kustomize overlay.
# Kargo owns the image tag in Git; Argo CD reconciles Git into the cluster.

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-staging
  namespace: argocd
  annotations:
    # Consents to the Kargo "staging" Stage in the "minecraft" project driving
    # this Application. Without it, argocd-update fails with "not authorized".
    kargo.akuity.io/authorized-stage: "minecraft:staging"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kalyano/minecraft-gitops.git
    targetRevision: main
    path: app/env/staging
  destination:
    server: http://cluster-demo:8001
    namespace: minecraft-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-prod
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: "minecraft:prod"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kalyano/minecraft-gitops.git
    targetRevision: main
    path: app/env/prod
  destination:
    server: http://cluster-demo:8001
    namespace: minecraft-prod
  syncPolicy:
    # prod keeps prune/selfHeal off by default so a human confirms the sync.
    # Flip to automated once you trust the pipeline.
    syncOptions:
      - CreateNamespace=true
