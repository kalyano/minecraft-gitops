apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: minecraft-server
  namespace: minecraft
spec:
  # Poll interval for discovering new Freight (Kargo also reconciles on demand).
  interval: 5m0s
  freightCreationPolicy: Automatic
  subscriptions:
    - image:
        # The itzg/minecraft-server image publishes clean SemVer tags
        # (e.g. 2026.6.0, 2026.6.1, 2026.7.0) alongside java-suffixed variants
        # (2026.7.0-java8, ...). allowTags restricts discovery to plain X.Y.Z
        # release tags so promotions stay predictable.
        repoURL: docker.io/itzg/minecraft-server
        imageSelectionStrategy: SemVer
        strictSemvers: true
        allowTags: ^[0-9]+\.[0-9]+\.[0-9]+$
        discoveryLimit: 20