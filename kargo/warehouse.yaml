apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: minecraft-server
  namespace: minecraft
spec:
  # Poll interval for discovering new Freight (Kargo also reconciles on demand).
  interval: 5m0s
  freightCreationPolicy: Automatic
  subscriptions:
    - image:
        # The itzg/minecraft-server image publishes clean SemVer tags
        # (e.g. 2026.6.0, 2026.6.1, 2026.7.0). strictSemvers ignores the
        # java-suffixed / "latest" / "stable" tags so promotions stay predictable.
        repoURL: docker.io/itzg/minecraft-server
        imageSelectionStrategy: SemVer
        strictSemvers: true
        discoveryLimit: 20
