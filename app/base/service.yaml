apiVersion: v1
kind: Service
metadata:
  name: minecraft
  labels:
    app: minecraft
spec:
  # ClusterIP keeps it simple on kind (no LoadBalancer/MetalLB required).
  # Connect from your laptop with:
  #   kubectl -n minecraft-dev port-forward svc/minecraft 25565:25565
  # then point your Minecraft client at localhost:25565.
  type: ClusterIP
  selector:
    app: minecraft
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      protocol: TCP
